# 使用這兩個指令，可以透過抓包確定是否真的經過 warp
# docker run -it --rm --network container:warp nicolaka/netshoot
# tcpdump -i any -n 'host 8.8.8.8 or port 443'

services:
  warp:
    container_name: deeplx-warp
    image: caomingjun/warp
    restart: unless-stopped
    device_cgroup_rules:
      - 'c 10:200 rwm'
    environment:
      - WARP_SLEEP=2
    cap_add:
      - MKNOD
      - AUDIT_WRITE
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ./warp-data:/var/lib/cloudflare-warp
    ports:
      - "1188:1188"

  deeplx:
    container_name: deeplx
    build: .
    restart: unless-stopped
    environment:
      - PROXY_LIST_URL=https://raw.githubusercontent.com/proxifly/free-proxy-list/main/proxies/all/data.txt
      - PROXY_UPDATE_INTERVAL=5
      - PROXY_LATENCY_TIMEOUT=3
    depends_on:
      - warp
    network_mode: "service:warp"